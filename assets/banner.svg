      <animate attributeName="fill" values="#F5F4ED;#F5F4ED;#5A5750" keyTimes="0;0.122;0.125" dur="5.7s" begin="4.2s" repeatCount="indefinite"/>
    </text>

    <!-- Roaming cursor ‚ÄĒ jumps to each command's y position in turn.
         calcMode=discrete = no interpolation between positions (instant jumps). -->
