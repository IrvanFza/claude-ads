  <line x1="0" y1="694" x2="1680" y2="694" stroke="rgba(217,119,87,0.22)" stroke-width="1"/>
  <text x="20"   y="711" class="hud">‚óŹ LINK ¬∑ STABLE</text>
  <text x="180"  y="711" class="hud">BUF 1024K</text>
  <text x="290"  y="711" class="hud">V1.7.1</text>
