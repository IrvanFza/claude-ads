               calcMode="discrete"
               repeatCount="indefinite"/>
    </rect>

    <!-- 7 commands, each with a staggered fill animation (bright‚Üídim cycle).
         keyTimes 0‚Üí0.122 = 0.7s bright window inside a 5.7s cycle.
         begin offsets stagger them top-to-bottom. -->
    <text class="cmd" text-anchor="end" y="55">
      <tspan class="cmd-slash">/</tspan>ads audit
      <animate attributeName="fill" values="#F5F4ED;#F5F4ED;#5A5750" keyTimes="0;0.122;0.125" dur="5.7s" begin="0s"   repeatCount="indefinite"/>
    </text>
    <text class="cmd" text-anchor="end" y="105">
      <tspan class="cmd-slash">/</tspan>ads google
      <animate attributeName="fill" values="#F5F4ED;#F5F4ED;#5A5750" keyTimes="0;0.122;0.125" dur="5.7s" begin="0.7s" repeatCount="indefinite"/>
