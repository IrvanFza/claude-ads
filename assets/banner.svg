    </text>
    <text class="cmd" text-anchor="end" y="205">
      <tspan class="cmd-slash">/</tspan>ads budget
      <animate attributeName="fill" values="#F5F4ED;#F5F4ED;#5A5750" keyTimes="0;0.122;0.125" dur="5.7s" begin="2.1s" repeatCount="indefinite"/>
    </text>
    <text class="cmd" text-anchor="end" y="255">
      <tspan class="cmd-slash">/</tspan>ads creative
      <animate attributeName="fill" values="#F5F4ED;#F5F4ED;#5A5750" keyTimes="0;0.122;0.125" dur="5.7s" begin="2.8s" repeatCount="indefinite"/>
    </text>
    <text class="cmd" text-anchor="end" y="305">
      <tspan class="cmd-slash">/</tspan>ads plan <tspan class="cmd-arg">&lt;type&gt;</tspan>
      <animate attributeName="fill" values="#F5F4ED;#F5F4ED;#5A5750" keyTimes="0;0.122;0.125" dur="5.7s" begin="3.5s" repeatCount="indefinite"/>
    </text>
    <text class="cmd" text-anchor="end" y="355">
