<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 1680 768" width="100%"
     preserveAspectRatio="xMidYMid meet" role="img"
     aria-label="Claude Ads ‚ÄĒ AI-Powered Ad Audit"
     font-family="JetBrains Mono, monospace">
<title>Claude Ads ‚ÄĒ Paid Advertising Audit Skill for Claude Code</title>
<desc>OpenHog-OS-style window. Cream title bar with traffic lights, dark CRT terminal inside with CLAUDE ADS figlet logo + command palette. Animated breathing gradient on the logo and blinking cursor.</desc>

<defs>
  <!-- Web fonts embedded inside the SVG so it renders correctly even when used as <img> -->
  <style type="text/css"><![CDATA[
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;600;700&family=Inter:wght@400;500;600&display=swap');

    .ascii      { font-family: 'JetBrains Mono', 'Cascadia Mono', 'Menlo', monospace; font-size: 22px; font-weight: 700; fill: url(#orangeGrad); }
    .tagline    { font-family: 'Inter', system-ui, sans-serif; font-size: 28px; font-weight: 500; fill: #F5F4ED; letter-spacing: -0.3px; }
    .sysline    { font-family: 'JetBrains Mono', 'Cascadia Mono', 'Menlo', monospace; font-size: 11px; fill: #7A3A1F; letter-spacing: 1.8px; }
    .sysline-accent { fill: #D97757; }
    .hud        { font-family: 'JetBrains Mono', 'Cascadia Mono', 'Menlo', monospace; font-size: 10px; fill: #7A3A1F; letter-spacing: 1.6px; }
    .hud-muted  { font-family: 'JetBrains Mono', 'Cascadia Mono', 'Menlo', monospace; font-size: 10px; fill: #5A5750; letter-spacing: 1.6px; }
    .cmd        { font-family: 'JetBrains Mono', 'Cascadia Mono', 'Menlo', monospace; font-size: 30px; fill: #5A5750; letter-spacing: 0.5px; }
    .cmd-active { fill: #F5F4ED; }
    .cmd-slash  { fill: #7A3A1F; }
    .cmd-arg    { fill: #7A3A1F; opacity: 0.7; }
    .cmd-head   { font-family: 'JetBrains Mono', 'Cascadia Mono', 'Menlo', monospace; font-size: 11px; fill: #D97757; letter-spacing: 2px; opacity: 0.65; }
    .cmd-head-b { fill: #7A3A1F; }
    .accent-line{ fill: #D97757; }
    .live-dot   { fill: #D97757; }
    .win-title  { font-family: 'JetBrains Mono', 'Cascadia Mono', 'Menlo', monospace; font-size: 15px; fill: #E0D2C4; font-weight: 600; }
  ]]></style>

  <!-- Vertical orange gradient (animated below) -->
  <linearGradient id="orangeGrad" x1="0" y1="-0.3" x2="0" y2="1.3" gradientUnits="objectBoundingBox">
    <stop offset="0%"   stop-color="#F5B095"/>
    <stop offset="25%"  stop-color="#E89270"/>
    <stop offset="50%"  stop-color="#D97757"/>
    <stop offset="75%"  stop-color="#B25B3F"/>
    <stop offset="100%" stop-color="#7A3A1F"/>

    <!-- BREATHING GRADIENT: vertical pan of the colour stops -->
    <animate attributeName="y1" values="-0.3;0.3;-0.3" dur="4.2s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="0.7;1.3;0.7"   dur="4.2s" repeatCount="indefinite"/>
  </linearGradient>

  <pattern id="scanlines" x="0" y="0" width="3" height="3" patternUnits="userSpaceOnUse">
    <rect width="3" height="2" fill="transparent"/>
    <rect x="0" y="2" width="3" height="1" fill="rgba(0,0,0,0.18)"/>
  </pattern>
</defs>

<!-- ‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź OS WINDOW SHELL (dark) ‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź -->
<rect x="0.5" y="0.5" width="1679" height="767" rx="10" fill="#2A2520" stroke="#3A312A" stroke-width="1"/>
<path d="M 0 10 Q 0 0 10 0 L 1670 0 Q 1680 0 1680 10 L 1680 48 L 0 48 Z" fill="#2A2520"/>
<line x1="0" y1="48" x2="1680" y2="48" stroke="#3A312A" stroke-width="1"/>
<text x="20" y="29" class="win-title">claude-ads.app ‚ÄĒ Terminal ¬∑ /ads audit</text>
<circle cx="1596" cy="24" r="9" fill="#fbbf24" stroke="#3A312A" stroke-width="0.7"/>
<circle cx="1624" cy="24" r="9" fill="#10b981" stroke="#3A312A" stroke-width="0.7"/>
<circle cx="1652" cy="24" r="9" fill="#ef4444" stroke="#3A312A" stroke-width="0.7"/>

<!-- ‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź TERMINAL CONTENT (dark canvas) ‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź -->
